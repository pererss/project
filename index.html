<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTCOR — Мессенджер</title>
  <meta name="description" content="SENTCOR — мессенджер с голосовыми чатами и друзьями." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --text-primary: #FFFFFF;
      --text-secondary: #8A8A93;
      --accent-color: #D4A359;
      --accent-color-hover: #C88A36;
      --bg-primary: #0C0C0E;
      --bg-secondary: #141417;
      --bg-tertiary: #1A1A1E;
      --border-color: rgba(255, 255, 255, 0.08);
    }
    
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    #app { height: 100%; width: 100%; position: relative; }

    .screen {
      width: 100%;
      min-height: 100vh;
      display: none; /* Changed from flex to none */
      justify-content: center;
      align-items: center;
      flex-direction: column;
      box-sizing: border-box;
      position: absolute;
      top: 0;
      left: 0;
      transition: opacity 0.3s ease;
      visibility: hidden;
      opacity: 0;
    }
    .screen.visible {
      display: flex;
      visibility: visible;
      opacity: 1;
    }

    /* Preloader Styles */
    #loading-screen {
        background-color: var(--bg-primary);
    }
    .preloader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .preloader-spinner {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 4px solid var(--bg-secondary);
      border-top-color: var(--accent-color);
      animation: spin 1s linear infinite;
    }
    .preloader-text {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Auth Screen Styles */
    .auth-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }
    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-title { font-size: 2rem; font-weight: 700; margin: 0; }
    .auth-subtitle { font-size: 1rem; color: var(--text-secondary); margin-top: 8px; }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; margin-bottom: 8px; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); }
    .input-group input {
      width: 100%; padding: 12px; background: var(--bg-tertiary);
      border: 1px solid var(--border-color); border-radius: 8px;
      color: var(--text-primary); font-size: 1rem; box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .input-group input:focus { outline: none; border-color: var(--accent-color); }
    .btn {
      padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; width: 100%; transition: background-color 0.2s ease;
    }
    .btn:hover { background-color: var(--accent-color-hover); }
    .btn-primary { background-color: var(--accent-color); color: var(--bg-primary); }
    .btn-secondary { background: var(--bg-tertiary); border: 1px solid var(--border-color); color: var(--text-primary); }
    .btn-secondary:hover { background: var(--bg-secondary); }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.875rem; color: var(--text-secondary); }
    .auth-footer a { color: var(--accent-color); text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }
    .auth-error-message { color: #ff9b9b; background-color: rgba(255, 100, 100, 0.1); border: 1px solid rgba(255, 100, 100, 0.2); padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; }
    .auth-divider { text-align: center; margin: 24px 0; color: var(--text-secondary); font-size: 0.75rem; text-transform: uppercase; display: flex; align-items: center; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
    .auth-divider span { padding: 0 16px; }

    /* App Layout */
    .app-layout { display: flex; width: 100%; height: 100vh; }
    .sidebar { width: 320px; background-color: var(--bg-secondary); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border-color); }
    .search-input {
        width: 100%; padding: 10px 16px; background: var(--bg-tertiary);
        border: 1px solid var(--border-color); border-radius: 8px;
        color: var(--text-primary); font-size: 0.9rem; box-sizing: border-box; transition: all 0.2s ease;
    }
    .search-input:focus { outline: none; border-color: var(--accent-color); }
    .scrollable-list { overflow-y: auto; flex-grow: 1; }
    .main-content { flex-grow: 1; padding: 24px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
    
    /* Friend List Item */
    .friend-item { display: flex; align-items: center; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border-color); transition: background-color 0.2s ease; }
    .friend-item.active, .friend-item:hover { background-color: var(--bg-tertiary); }
    .friend-item.active { border-left: 3px solid var(--accent-color); padding-left: 13px; }
    .friend-avatar { position: relative; margin-right: 12px; }
    .friend-avatar img { width: 40px; height: 40px; border-radius: 50%; background-color: var(--bg-tertiary); }
    .status-indicator { position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--bg-secondary); }
    .status-indicator.online { background-color: #22c55e; }
    .status-indicator.offline { background-color: #71717a; }
    .friend-info { flex-grow: 1; overflow: hidden; }
    .friend-name { font-weight: 600; color: var(--text-primary); }
    .friend-last-message { font-size: 0.875rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .friend-meta { text-align: right; font-size: 0.75rem; color: var(--text-secondary); }
    .last-message-time { margin-bottom: 4px; }
    .unread-count { background-color: var(--accent-color); color: var(--bg-primary); font-weight: 700; border-radius: 10px; padding: 2px 6px; font-size: 0.7rem; display: inline-block; }
    .empty-list-placeholder, .error-placeholder { text-align: center; padding: 40px 20px; color: var(--text-secondary); }

    /* Skeleton Loader Styles */
    .skeleton { animation: skeleton-loading 1.5s linear infinite alternate; background-color: var(--bg-tertiary); }
    .skeleton-friend-item { display: flex; align-items: center; padding: 12px 16px; }
    .skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; }
    .skeleton-friend-info { flex: 1; }
    .skeleton-text { height: 1em; margin-bottom: .5em; border-radius: .25rem; }
    @keyframes skeleton-loading {
      from { background-color: var(--bg-tertiary); }
      to { background-color: var(--bg-secondary); }
    }
  </style>

  <!-- Core Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>

  <!-- Global Namespace -->
  <script>
    window.S = window.SENTCOR = window.S || {};
    window.S.ui = window.S.ui || {};
  </script>
</head>
<body>

  <div id="app">
    <div id="loading-screen" class="screen visible">
      <div class="preloader-container">
        <div class="preloader-spinner"></div>
        <p id="loading-status-text" class="preloader-text">Загрузка...</p>
      </div>
    </div>
    <div id="auth-screen" class="screen">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Вход</h1>
                <p class="auth-subtitle">Войдите в свой аккаунт SENTCOR</p>
            </div>
            <div id="auth-error-message" class="auth-error-message"></div>
            <form id="auth-form"></form>
            <div id="auth-footer"></div>
        </div>
    </div>
    <div id="main-app-screen" class="screen">
      <div class="app-layout">
        <div id="friends-list-container" class="sidebar">
            <div class="sidebar-header">
                <input type="text" id="friend-search-input" class="search-input" placeholder="Найти друга...">
            </div>
            <div id="friends-list" class="scrollable-list">
                <!-- Friend items will be injected here by app.js -->
            </div>
        </div>
        <div class="main-content">
            <p>Выберите чат для начала общения.</p>
        </div>
      </div>
    </div>
    <div id="error-screen" class="screen"></div>
  </div>
  <div id="toast-container"></div>

  <!-- Core Module Loading Order -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/connection.js"></script>
  
  <!-- Feature Modules -->
  <script src="js/servers.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/main.js"></script>

  <!-- Main Application Entry Point -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Initialize UI and Toast modules first
      if (window.S?.ui?.init) window.S.ui.init();
      if (window.S?.toast?.init) window.S.toast.init();
      
      // Use optional chaining for safety
      await window.S?.ui?.showLoading('Инициализация...');

      try {
        const sessionInitialized = await window.S.auth.initSession();
        if (!sessionInitialized) {
          console.log("[Init] No active session. Showing auth screen.");
          await window.S?.ui?.hideLoading();
          window.S?.ui?.showAuth();
        }
        // On successful session, hideLoading is called within app.js or auth.js
      } catch (err) {
        console.error('[Init] Critical failure during session initialization:', err);
        await window.S?.ui?.hideLoading();
        // Show a fatal error screen
        window.S?.ui?.showErrorState('Не удалось инициализировать сессию.', { isFatal: true, errorDetails: err });
      }
    });
  </script>
</body>
</html>
