<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SentCor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔶</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- AUTH -->
  <div id="auth-screen" class="auth-screen active">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3" transform="rotate(45 12 12)" />
            <rect x="7" y="7" width="10" height="10" rx="1" transform="rotate(45 12 12)" />
          </svg>
        </div>
        <h1>SentCor</h1>
        <p>Премиальный мессенджер</p>
      </div>
      <div class="auth-form">
        <input type="email" id="auth-email" class="input" placeholder="Email" autocomplete="email">
        <input type="password" id="auth-password" class="input" placeholder="Пароль" autocomplete="current-password">
        <input type="text" id="auth-username" class="input" placeholder="Логин" autocomplete="username" style="display:none;">
        <div id="auth-error" class="auth-error"></div>
        <button id="auth-submit" class="btn btn--accent" type="button" style="width:100%;">Войти</button>
      </div>
      <div id="auth-toggle" class="auth-toggle">
        Нет аккаунта? <span class="auth-link">Зарегистрироваться</span>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app-screen" class="main-screen">

    <!-- Rail Navigation (72px) -->
    <nav class="server-rail" id="server-rail">
      <div class="rail-icon rail-icon--logo" data-rail="logo" title="SentCor">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3" transform="rotate(45 12 12)" /><rect x="7" y="7" width="10" height="10" rx="1" transform="rotate(45 12 12)" /></svg>
      </div>
      <div class="rail-divider"></div>
      <div class="rail-icon active" data-rail="chats" title="Чаты">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="rail-icon" data-rail="friends" title="Друзья">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div class="rail-icon" data-rail="servers" title="Серверы">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <div class="rail-divider"></div>
      <div id="server-list-rail"></div>
      <div class="rail-icon rail-icon--add" id="create-server-btn" title="Создать сервер">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </nav>

    <!-- Sub-sidebar (260px) -->
    <aside class="sub-sidebar" id="sub-sidebar"></aside>

    <!-- Main Content Area -->
    <main class="main-content" id="main-content">
      <div class="chat-header" id="chat-header">
        <div id="chat-header-avatar"></div>
        <div class="chat-header-info">
          <div id="chat-header-name" class="chat-header-name"></div>
          <div id="chat-header-status" class="header-status"></div>
        </div>
      </div>
      <div id="messages-area" class="messages-area">
        <div class="messages-spacer"></div>
        <div class="empty-state" id="empty-chat">
          <div class="empty-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
          <div class="empty-title">Выберите диалог</div>
          <div class="empty-text">Выберите чат слева или начните новый разговор</div>
        </div>
      </div>
      <div class="message-input-area" id="message-input-area" style="display:none;">
        <div class="message-input-wrapper">
          <textarea id="message-input" class="message-input" placeholder="Написать сообщение..." rows="1"></textarea>
          <button id="send-btn" class="send-btn" title="Отправить">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </main>

    <!-- Right Sidebar (240px) -->
    <aside class="right-sidebar" id="right-sidebar"></aside>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
