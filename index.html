<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTCOR — Игровой мессенджер</title>
  <meta name="description" content="SENTCOR — игровой мессенджер с голосовыми чатами, серверами и друзьями." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="noopener noreferrer" />
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- LiveKit Client SDK -->
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
</head>
<body>
  <div id="app"></div>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/servers.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/voice.js"></script>

  <script>
    (function(){
      // Safe init: guard against missing modules
      try{
        (async function(){
          const S = window.SENTCOR || {};
          if (S.ui && typeof S.ui.showAuth === 'function') S.ui.showAuth();
          // initSession may be undefined if auth module failed to load
          if (S.auth && typeof S.auth.initSession === 'function'){
            const ok = await S.auth.initSession();
            if (ok){
              try{ await S.auth.setOnlineStatus("online"); }catch(e){}
              if (S.ui && typeof S.ui.showApp === 'function') S.ui.showApp();
            }
          }

          // beforeunload: send a lightweight beacon to set status offline
          window.addEventListener('beforeunload', function(){
            try{
              if (window.navigator && window.navigator.sendBeacon && window.SENTCOR && window.SENTCOR.user){
                const S2 = window.SENTCOR;
                const url = (S2.SENTCOR_CONFIG && S2.SENTCOR_CONFIG.SUPABASE_URL ? S2.SENTCOR_CONFIG.SUPABASE_URL : '') + '/rest/v1/profiles?id=eq.' + S2.user.id;
                const payload = JSON.stringify({ status: 'offline', last_login: new Date().toISOString() });
                navigator.sendBeacon(url, new Blob([payload], { type: 'application/json' }));
              }
            }catch(e){ /* ignore */ }
          });
        })();
      }catch(e){
        console.warn('SENTCOR init failed', e);
      }
    })();
  </script>
</body>
</html>
