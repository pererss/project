<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SentCor</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="auth-screen active">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>SentCor</h1>
        <p>Премиальный мессенджер</p>
      </div>
      <div class="auth-form">
        <input type="email" id="auth-email" class="input" placeholder="Email" autocomplete="email">
        <input type="password" id="auth-password" class="input" placeholder="Пароль" autocomplete="current-password">
        <input type="text" id="auth-username" class="input" placeholder="Логин" autocomplete="username" style="display:none;">
        <div id="auth-error" class="auth-error"></div>
        <button id="auth-submit" class="btn btn--accent" style="width:100%;">Войти</button>
      </div>
      <div id="auth-toggle" class="auth-toggle">
        Нет аккаунта? <span class="auth-link">Зарегистрироваться</span>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app-screen" class="main-screen">

    <!-- Server Rail -->
    <nav class="server-rail">
      <div class="rail-icon rail-icon--logo active" data-rail="chats" title="SentCor">
        <span style="font-size:15px;font-weight:800;">SC</span>
      </div>
      <div class="rail-icon" data-rail="chats" title="Чаты">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="rail-icon" data-rail="friends" title="Друзья">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div class="rail-divider"></div>
      <div class="rail-icon rail-icon--add" title="Создать">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">SentCor</div>
        <!-- Nav tabs: Чаты / Друзья / Заявки -->
        <div class="nav-tabs">
          <button class="nav-tab active" data-view="chats" title="Чаты">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Чаты
          </button>
          <button class="nav-tab" data-view="friends" title="Друзья">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            Друзья
          </button>
          <button class="nav-tab" data-view="requests" title="Заявки">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            Заявки
            <span id="requests-badge" class="nav-tab-badge" style="display:none;">0</span>
          </button>
        </div>
        <!-- Search -->
        <div class="search-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="sidebar-search" placeholder="Найти или начать беседу">
        </div>
      </div>

      <div class="conv-section-label">Личные сообщения</div>
      <div id="conversations-list" class="conversations">
        <div class="empty-state empty-state--sm"><div class="empty-text">Загрузка...</div></div>
      </div>

      <div id="profile-bar" class="profile-bar">
        <div class="profile-avatar">
          <div class="avatar" style="width:34px;height:34px;"><span class="avatar-fallback" style="font-size:14px;">U</span></div>
          <span class="status-dot" style="background:#71717A;"></span>
        </div>
        <div class="profile-info">
          <div class="profile-name">@User</div>
          <div class="profile-status">Офлайн</div>
        </div>
        <div class="profile-actions">
          <button class="btn-icon" id="settings-btn" title="Настройки">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <button class="btn-icon" id="logout-btn" title="Выйти">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="chat-area">
      <div class="chat-header" id="chat-header">
        <span class="chat-header-hash" id="chat-header-hash">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
        </span>
        <div id="chat-header-avatar"></div>
        <div class="chat-header-info">
          <div id="chat-header-name" class="chat-header-name"></div>
          <div id="chat-header-status" class="header-status"></div>
        </div>
        <nav class="tab-nav">
          <button class="tab-btn active" data-tab="chat">Чат</button>
          <button class="tab-btn" data-tab="friends">Друзья</button>
        </nav>
      </div>

      <!-- Chat tab -->
      <div id="tab-chat" class="tab-content active">
        <div id="chat-messages" class="messages-area">
          <div class="messages-spacer"></div>
          <div class="empty-state">
            <div class="empty-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
            <div class="empty-title">Выберите диалог</div>
            <div class="empty-text">Выберите чат слева, чтобы начать общение</div>
          </div>
        </div>
        <div class="message-input-area">
          <div class="message-input-wrapper">
            <textarea id="message-input" class="message-input" placeholder="Написать сообщение..." rows="1"></textarea>
            <button id="emoji-btn" class="emoji-trigger" title="Эмодзи">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            </button>
          </div>
          <button id="send-btn" class="send-btn" title="Отправить">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>

      <!-- Friends tab -->
      <div id="tab-friends" class="tab-content">
        <div class="friends-view">
          <div class="friends-header">
            <button class="sub-tab active" data-subtab="all">Все</button>
            <button class="sub-tab" data-subtab="online">В сети</button>
            <button class="sub-tab" data-subtab="pending">В ожидании</button>
            <button class="sub-tab sub-tab--accent" data-subtab="addfriend">+ Добавить в друзья</button>
          </div>
          <div id="friends-content" class="friends-list" style="flex:1;overflow-y:auto;"></div>
        </div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
