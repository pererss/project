<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTCOR — Мессенджер</title>
  <meta name="description" content="SENTCOR — мессенджер с голосовыми чатами и друзьями." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

  <!-- Core Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>

  <!-- Global Namespace -->
  <script>
    window.S = window.SENTCOR = window.S || {};
  </script>
</head>
<body>

  <div id="app">
    <!-- Loading Screen -->
    <div id="loading-screen" class="screen visible">
      <div class="preloader-container">
        <div class="preloader-spinner"></div>
        <p id="loading-status-text" class="preloader-text">Загрузка...</p>
      </div>
    </div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="screen">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Вход</h1>
                <p class="auth-subtitle">Войдите в свой аккаунт SENTCOR</p>
            </div>
            <div id="auth-error-message" class="auth-error-message"></div>
            <form id="auth-form"></form>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="main-app-screen" class="screen">
      <div class="app-layout">
        
        <!-- 1. Servers Navigation Sidebar -->
        <nav class="servers-nav">
            <div class="server-item active" data-server-id="home">
                <i class="fa-solid fa-comments server-item-icon"></i>
            </div>
            <div class="nav-separator"></div>
            <div class="server-item server-item-add">
                <i class="fa-solid fa-plus server-item-icon"></i>
            </div>
        </nav>

        <!-- 2. Main Sidebar -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <input type="text" id="global-search-input" class="search-input" placeholder="Найти или начать разговор">
            </header>
            
            <div class="sidebar-content" id="friends-list-container">
                <h2 class="sidebar-section-title">Личные сообщения</h2>
                <div id="friends-list">
                    <!-- Friends list or empty state will be injected here -->
                </div>
            </div>

            <footer class="profile-panel">
                <div id="profile-avatar-wrapper" class="profile-avatar-wrapper">
                    <!-- Avatar will be injected here -->
                </div>
                <div class="profile-info">
                    <div id="profile-username" class="profile-name">Загрузка...</div>
                    <div id="profile-subtext" class="profile-subtext">в сети</div>
                </div>
                <div class="profile-actions">
                    <button class="btn-icon" aria-label="Mute"><i class="fa-solid fa-microphone-slash"></i></button>
                    <button class="btn-icon" aria-label="Settings"><i class="fa-solid fa-gear"></i></button>
                </div>
            </footer>
        </aside>

        <!-- 3. Main Chat Container -->
        <main class="main-container">
            <header class="chat-header">
                <div class="chat-title-section">
                    <i class="fa-solid fa-at chat-title-icon"></i>
                    <span class="chat-title-text">Друзья</span>
                </div>
                <nav id="chat-tabs" class="chat-tabs">
                    <button class="tab-item active" data-tab="friends-online">В сети</button>
                    <button class="tab-item" data-tab="friends-all">Все</button>
                    <button class="tab-item" data-tab="friends-pending">В ожидании</button>
                    <button class="tab-item primary" data-tab="add-friend">Добавить в друзья</button>
                </nav>
            </header>

            <div id="main-content-area" class="chat-content">
                <!-- Content views will be injected and toggled here -->
                <div id="view-friends" class="content-view visible">
                    <div class="chat-welcome">
                        <div class="welcome-icon">👋</div>
                        <h2 class="welcome-title">Выберите друга</h2>
                        <p>Выберите друга из списка, чтобы начать общение.</p>
                    </div>
                </div>

                <div id="view-add-friend" class="content-view add-friend-view">
                    <h3>Добавить друга</h3>
                    <p>Вы можете добавить друга по его уникальному имени пользователя.</p>
                    <form id="add-friend-form" class="add-friend-form">
                        <input type="text" id="add-friend-username" class="search-input" placeholder="Имя пользователя" required>
                        <button type="submit" class="btn-primary">Отправить запрос</button>
                    </form>
                    <div id="add-friend-results"></div>
                </div>
            </div>

            <form class="chat-input-form">
                <div class="chat-input-wrapper">
                    <button type="button" class="btn-icon" aria-label="Attach file"><i class="fa-solid fa-paperclip"></i></button>
                    <input type="text" class="chat-input" placeholder="Написать сообщение..." disabled>
                    <button type="submit" class="btn-icon" aria-label="Send message" disabled><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </form>
        </main>

      </div>
    </div>
  </div>
  
  <div id="toast-container"></div>

  <!-- Module Loading Order -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/main.js"></script>

  <!-- Main Entry Point -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (window.S?.main?.init) {
        window.S.main.init();
      } else {
        console.error("Fatal: S.main.init() not found.");
        document.body.innerHTML = '<div style="color:red; text-align:center; padding-top: 50px;">Критическая ошибка: Не удалось запустить приложение.</div>';
      }
    });
  </script>
</body>
</html>
