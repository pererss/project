<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTCOR — Игровой мессенджер</title>
  <meta name="description" content="SENTCOR — игровой мессенджер с голосовыми чатами, серверами и друзьями." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  
  <!-- Main Monochrome Theme -->
  <link rel="stylesheet" href="css/theme-monochrome.css" />

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <!-- SDKs -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>

  <!-- Core SENTCOR Initializer -->
  <script>
    window.S = window.SENTCOR = window.S || {};
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="toast-container"></div>

  <!-- 
    Core Module Loading Order:
    1. config.js & supabase.js: Base configuration.
    2. ui.js: Manages all DOM interactions and must define S.ui and S.ui.onReady.
    3. toast.js, auth.js, connection.js: Core services that depend on the base S object.
    4. Feature modules: Depend on core services.
  -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/connection.js"></script>
  
  <!-- Feature Modules -->
  <script src="js/servers.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/voice.js"></script>

  <!-- Main Application Entry Point -->
  <script>
    S.ui.onReady(async function() {
      // Phase 1: Core System Initialization
      S.toast.init();
      S.ui.init();
      
      S.ui.showLoadingScreen();

      try {
        // Phase 2: Session & Connection
        const sessionInitialized = await S.auth.initSession();
        
        if (sessionInitialized) {
          S.connection.init(); 

          // Phase 3: Full App Load
          S.appLoaded = true;
          await S.auth.setOnlineStatus("online");
          S.ui.showApp();
          
          // Initialize feature modules that need to run after login
          S.servers.init();
          S.friends.init();

        } else {
          console.log("No active session. Displaying Auth UI.");
          S.ui.showAuth();
        }
      } catch (error) {
        // Phase 4: Critical Failure Handling
        console.error("CRITICAL INITIALIZATION FAILURE:", error);
        S.ui.showErrorState("Критическая ошибка. Не удалось запустить приложение. Попробуйте обновить страницу.");
      }

      // Unload handler
      window.addEventListener("beforeunload", () => {
        if (!S.appLoaded || !S.user) return;
        S.auth.setOnlineStatus("offline");
      });
    });
  </script>
</body>
</html>
