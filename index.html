<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTCOR — Игровой мессенджер</title>
  <meta name="description" content="SENTCOR — игровой мессенджер с голосовыми чатами, серверами и друзьями." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- LiveKit Client SDK -->
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
  <!-- Twemoji for emoji rendering -->
  <script src="https://cdn.jsdelivr.net/npm/twemoji@14/dist/twemoji.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Auth screen by default, rendered by js/ui.js -->
  </div>

  <!-- Load scripts in order -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/servers.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/voice.js"></script>

  <!-- App Initialization -->
  <script>
    (async function () {
      "use strict";
      const S = window.SENTCOR;

      // Show auth screen first
      S.ui.showAuth();

      // Check existing session
      const hasSession = await S.auth.initSession();
      if (hasSession) {
        await S.auth.setOnlineStatus("online");
        await S.auth.recordLogin();
        S.ui.showApp();
      }

      // Visibility => idle/online
      document.addEventListener("visibilitychange", async () => {
        if (!S.user) return;
        await S.auth.setOnlineStatus(document.hidden ? "idle" : "online");
      });

      // Unload => offline via sendBeacon
      window.addEventListener("beforeunload", () => {
        if (S.user) {
          const url = `${S.SENTCOR_CONFIG.SUPABASE_URL}/rest/v1/profiles?id=eq.${S.user.id}`;
          const body = JSON.stringify({ status: "offline", last_login: new Date().toISOString() });
          navigator.sendBeacon(url, new Blob([body], { type: "application/json" }));
        }
      });
    })();
  </script>
</body>
</html>
