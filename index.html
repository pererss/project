<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SentCor — Мессенджер</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ===================================================
       AUTH SCREEN
       =================================================== -->
  <div id="auth-screen" class="auth-screen active">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>SentCor</h1>
        <p>Безопасный мессенджер нового поколения</p>
      </div>
      <div class="auth-form">
        <input type="email" id="auth-email" class="input" placeholder="Email" autocomplete="email">
        <input type="password" id="auth-password" class="input" placeholder="Пароль" autocomplete="current-password">
        <input type="text" id="auth-username" class="input" placeholder="Логин" autocomplete="username" style="display:none;">
        <div id="auth-error" class="auth-error"></div>
        <button id="auth-submit" class="btn btn--accent" style="width:100%;">Войти</button>
      </div>
      <div id="auth-toggle" class="auth-toggle">
        Нет аккаунта? <span>Зарегистрироваться</span>
      </div>
    </div>
  </div>

  <!-- ===================================================
       MAIN APP SCREEN
       =================================================== -->
  <div id="main-app-screen" class="main-screen">

    <!-- Navigation Rail -->
    <nav class="nav-rail">
      <div class="nav-icon active" title="Личные сообщения">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="nav-divider"></div>
      <div class="nav-icon" title="Добавить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Диалоги</h2>
        <input type="text" id="sidebar-search" class="sidebar-search" placeholder="Поиск...">
      </div>
      <div id="conversations-list" class="conversations">
        <div class="empty-state empty-state--small">
          <div class="empty-icon">&#128172;</div>
          <div class="empty-text">Загрузка...</div>
        </div>
      </div>
      <div id="profile-bar" class="profile-bar">
        <div class="avatar avatar--letter"><span class="avatar-initial">U</span></div>
        <div class="profile-info">
          <div class="profile-name">Загрузка...</div>
          <div class="profile-status">В сети</div>
        </div>
      </div>
    </aside>

    <!-- Chat Area -->
    <main class="chat-area">
      <!-- Header -->
      <div class="chat-header">
        <div id="chat-header-avatar"></div>
        <div class="chat-header-info">
          <div id="chat-header-name">Выберите диалог</div>
          <div id="chat-header-status" class="header-status"></div>
        </div>
        <nav class="tab-nav">
          <button class="tab-btn active" data-tab="chat">Чат</button>
          <button class="tab-btn" data-tab="friends">Все друзья</button>
          <button class="tab-btn" data-tab="pending">В ожидании</button>
          <button class="tab-btn tab-btn--accent" data-tab="addfriend">Добавить в друзья</button>
        </nav>
      </div>

      <!-- Tab: Chat -->
      <div id="tab-chat" class="tab-content active">
        <div id="chat-messages" class="messages-area">
          <div class="empty-state">
            <div class="empty-icon">&#128172;</div>
            <div class="empty-title">Выберите диалог</div>
            <div class="empty-text">Выберите чат слева, чтобы начать общение</div>
          </div>
        </div>
        <div class="message-input-area">
          <textarea id="message-input" class="message-input" placeholder="Написать сообщение..." rows="1"></textarea>
          <button id="send-btn" class="send-btn" title="Отправить">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Tab: Friends -->
      <div id="tab-friends" class="tab-content">
        <div id="friends-list-content" class="friends-list"></div>
      </div>

      <!-- Tab: Pending -->
      <div id="tab-pending" class="tab-content">
        <div id="pending-list-content" class="pending-list"></div>
      </div>

      <!-- Tab: Add Friend -->
      <div id="tab-addfriend" class="tab-content">
        <div id="addfriend-content" class="addfriend-form"></div>
      </div>
    </main>
  </div>

  <!-- ===================================================
       SCRIPTS
       =================================================== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
