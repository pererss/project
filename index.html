<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTCOR — Игровой мессенджер</title>
  <meta name="description" content="SENTCOR — игровой мессенджер с голосовыми чатами, серверами и друзьями." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --text-primary: #e4e4e7;
      --text-secondary: #a1a1aa;
      --accent-glow: 0 0 15px rgba(99, 102, 241, 0.5), 0 0 5px rgba(99, 102, 241, 0.8);
    }
    
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: radial-gradient(circle at center, #18181c 0%, #050505 100%);
      color: var(--text-primary);
      overflow: hidden;
    }

    #app { height: 100%; width: 100%; }

    .screen {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      box-sizing: border-box;
      position: absolute;
      top: 0;
      left: 0;
      transition: opacity 0.4s ease, visibility 0.4s;
      visibility: hidden;
      opacity: 0;
    }
    .screen[style*="display: flex"] {
      visibility: visible;
      opacity: 1;
    }

    .spinner {
      width: 56px; height: 56px;
      border: 5px solid rgba(255, 255, 255, 0.1);
      border-bottom-color: #6366f1;
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
    }
    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .auth-card {
      background: rgba(20, 20, 25, 0.75);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-title { font-size: 2.25rem; font-weight: 700; margin: 0; }
    .auth-subtitle { font-size: 1rem; color: var(--text-secondary); margin-top: 8px; }

    .input-group { margin-bottom: 20px; }
    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .input-group input {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-group input:focus {
      outline: none;
      border-color: rgba(99, 102, 241, 0.7);
      box-shadow: var(--accent-glow);
    }

    .btn {
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(90deg, #4f46e5, #6366f1);
      color: white;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }
    .btn-primary:hover { box-shadow: var(--accent-glow); }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }

    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.875rem; color: var(--text-secondary); }
    .auth-footer a { color: #818cf8; text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }

    .auth-error-message {
      color: #fca5a5;
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }

    .auth-divider {
      text-align: center; margin: 24px 0; color: var(--text-secondary);
      font-size: 0.75rem; text-transform: uppercase; display: flex; align-items: center;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .auth-divider span { padding: 0 16px; }
  </style>

  <!-- Core Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>

  <!-- Global Namespace -->
  <script>
    window.S = window.SENTCOR = window.S || {};
  </script>
</head>
<body>

  <div id="app">
    <div id="loading-screen" class="screen" style="display: flex;"><div class="spinner"></div></div>
    <div id="auth-screen" class="screen" style="display: none;">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Вход</h1>
                <p class="auth-subtitle">Войдите в свой аккаунт SENTCOR</p>
            </div>
            <div id="auth-error-message" class="auth-error-message"></div>
            <form id="auth-form"></form>
            <div id="auth-footer"></div>
        </div>
    </div>
    <div id="main-app-screen" class="screen" style="display: none;"></div>
    <div id="error-screen" class="screen" style="display: none;"></div>
  </div>
  <div id="toast-container"></div>

  <!-- Core Module Loading Order -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/connection.js"></script>
  
  <!-- Feature Modules -->
  <script src="js/servers.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/main.js"></script>

  <!-- Main Application Entry Point -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (window.S?.toast?.init) window.S.toast.init();
      if (window.S?.ui?.init) window.S.ui.init();

      try {
        const sessionInitialized = await window.S.auth.initSession();
        if (!sessionInitialized) {
          console.log("[Init] No active session. Showing auth screen.");
          if (window.S?.ui?.showAuth) {
            window.S.ui.showAuth();
          } else {
            const authScreen = document.getElementById('auth-screen');
            if (authScreen) authScreen.style.display = 'flex';
          }
        }
      } catch (err) {
        console.warn('[Init] Soft failure during session initialization:', err);
        if (window.S?.ui?.showAuth) {
          window.S.ui.showAuth();
        } else {
           const authScreen = document.getElementById('auth-screen');
           if (authScreen) authScreen.style.display = 'flex';
        }
      }
    });
  </script>
</body>
</html>
