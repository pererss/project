<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SentCor</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ===================================================
       AUTH SCREEN
       =================================================== -->
  <div id="auth-screen" class="auth-screen active">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>SentCor</h1>
        <p>Мессенджер нового поколения</p>
      </div>
      <div class="auth-form">
        <input type="email" id="auth-email" class="input" placeholder="Email" autocomplete="email">
        <input type="password" id="auth-password" class="input" placeholder="Пароль" autocomplete="current-password">
        <input type="text" id="auth-username" class="input" placeholder="Логин" autocomplete="username" style="display:none;">
        <div id="auth-error" class="auth-error"></div>
        <button id="auth-submit" class="btn btn--accent" style="width:100%;">Войти</button>
      </div>
      <div id="auth-toggle" class="auth-toggle">
        Нет аккаунта? <span class="auth-link">Зарегистрироваться</span>
      </div>
    </div>
  </div>

  <!-- ===================================================
       MAIN APP SCREEN
       =================================================== -->
  <div id="main-app-screen" class="main-screen">

    <!-- Server Rail (Left) -->
    <nav class="server-rail">
      <div class="nav-icon nav-icon--logo active" data-nav="dm" title="Личные сообщения">
        <span style="font-size:18px;font-weight:700;">SC</span>
      </div>
      <div class="nav-divider"></div>
      <div class="nav-icon nav-icon--add" title="Добавить сервер">+</div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Друзья</h2>
        <input type="text" id="sidebar-search" class="sidebar-search" placeholder="Найти или начать беседу">
      </div>

      <div id="sidebar-friends-btn" class="sidebar-friends-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Друзья</span>
        <span id="pending-badge" class="sidebar-friends-badge" style="display:none;">0</span>
      </div>

      <div class="conv-section-label">Личные сообщения</div>

      <div id="conversations-list" class="conversations">
        <div class="empty-state empty-state--small">
          <div class="empty-text">Загрузка...</div>
        </div>
      </div>

      <div id="profile-bar" class="profile-bar">
        <div class="profile-avatar-wrap">
          <div class="avatar avatar--letter" style="width:32px;height:32px;"><span class="avatar-initial" style="font-size:13px;">U</span></div>
          <span class="profile-status-dot" style="background:#80848E;"></span>
        </div>
        <div class="profile-info">
          <div class="profile-name">@User</div>
          <div class="profile-status-text">Офлайн</div>
        </div>
        <div class="profile-actions">
          <button class="btn-icon" id="settings-btn" title="Настройки">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <button class="btn-icon" id="logout-btn" title="Выйти">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="chat-area">

      <!-- Chat Header (shown when chat is active) -->
      <div class="chat-header" id="chat-header">
        <span class="chat-header-hash" id="chat-header-hash">#</span>
        <div id="chat-header-avatar"></div>
        <div class="chat-header-info">
          <div id="chat-header-name" class="chat-header-name"></div>
          <div id="chat-header-status" class="header-status"></div>
        </div>
        <nav class="tab-nav">
          <button class="tab-btn active" data-tab="chat">Чат</button>
          <button class="tab-btn" data-tab="friends">Друзья</button>
        </nav>
      </div>

      <!-- Tab: Chat -->
      <div id="tab-chat" class="tab-content active">
        <div id="chat-messages" class="messages-area">
          <div class="messages-spacer"></div>
          <div class="empty-state">
            <div class="empty-icon">&#128172;</div>
            <div class="empty-title">Выберите диалог</div>
            <div class="empty-text">Выберите чат слева, чтобы начать общение</div>
          </div>
        </div>
        <div class="message-input-area">
          <div class="message-input-wrapper">
            <textarea id="message-input" class="message-input" placeholder="Написать сообщение..." rows="1"></textarea>
            <button id="emoji-btn" class="emoji-trigger" title="Эмодзи">😊</button>
          </div>
          <button id="send-btn" class="send-btn" title="Отправить">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Tab: Friends -->
      <div id="tab-friends" class="tab-content">
        <div class="friends-view">
          <div class="friends-header">
            <button class="friends-tab-btn active" data-friends-tab="online">В сети</button>
            <button class="friends-tab-btn" data-friends-tab="all">Все</button>
            <button class="friends-tab-btn" data-friends-tab="pending">В ожидании</button>
            <button class="friends-tab-btn friends-tab-btn--accent" data-friends-tab="addfriend">Добавить в друзья</button>
          </div>
          <div id="friends-content" class="friends-list" style="flex:1;overflow-y:auto;"></div>
        </div>
      </div>

    </main>
  </div>

  <!-- ===================================================
       SCRIPTS
       =================================================== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
