<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTCOR — Мессенджер</title>
  <meta name="description" content="SENTCOR — мессенджер с голосовыми чатами и друзьями." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

  <!-- Core Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>

  <!-- Global Namespace -->
  <script>
    window.S = window.SENTCOR = window.S || {};
    window.S.ui = window.S.ui || {};
  </script>
</head>
<body>

  <div id="app">
    <!-- Loading Screen -->
    <div id="loading-screen" class="screen visible">
      <div class="preloader-container">
        <div class="preloader-spinner"></div>
        <p id="loading-status-text" class="preloader-text">Загрузка...</p>
      </div>
    </div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="screen">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Вход</h1>
                <p class="auth-subtitle">Войдите в свой аккаунт SENTCOR</p>
            </div>
            <div id="auth-error-message" class="auth-error-message"></div>
            <form id="auth-form"></form>
            <div id="auth-footer"></div>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="main-app-screen" class="screen">
      <div class="app-layout">
        
        <!-- 1. Servers Navigation Sidebar (Far Left) -->
        <nav class="servers-nav">
            <div class="server-item active" data-server-id="home">
                <i class="fa-solid fa-comments server-item-icon"></i>
            </div>
            <div class="nav-separator"></div>
            <div class="server-item" data-server-id="123">
                <img src="https://picsum.photos/id/10/48/48" alt="Server 1">
            </div>
            <div class="server-item" data-server-id="456">
                <img src="https://picsum.photos/id/25/48/48" alt="Server 2">
            </div>
            <div class="server-item server-item-add">
                <i class="fa-solid fa-plus server-item-icon"></i>
            </div>
        </nav>

        <!-- 2. Main Sidebar (Friends/Channels) -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <input type="text" id="friend-search-input" class="search-input" placeholder="Найти или начать разговор">
            </header>
            
            <div class="sidebar-content" id="friends-list-container">
                <h2 class="sidebar-section-title">Личные сообщения</h2>
                <div id="friends-list">
                    <!-- Friend items will be injected here by app.js -->
                </div>
            </div>

            <footer class="profile-panel">
                <div class="profile-avatar">
                    <img id="profile-avatar-img" src="assets/default-avatar.png" alt="User Avatar">
                    <div id="profile-status" class="profile-status online"></div>
                </div>
                <div class="profile-info">
                    <div id="profile-username" class="profile-name">Загрузка...</div>
                    <div id="profile-subtext" class="profile-subtext">в сети</div>
                </div>
                <div class="profile-actions">
                    <button class="btn-icon" aria-label="Mute"><i class="fa-solid fa-microphone-slash"></i></button>
                    <button class="btn-icon" aria-label="Settings"><i class="fa-solid fa-gear"></i></button>
                </div>
            </footer>
        </aside>

        <!-- 3. Main Chat Container -->
        <main class="main-container">
            <header class="chat-header">
                <div class="chat-title-section">
                    <i class="fa-solid fa-at chat-title-icon"></i>
                    <span class="chat-title-text">Друзья</span>
                </div>
                <nav class="chat-tabs">
                    <div class="tab-item active">В сети</div>
                    <div class="tab-item">Все</div>
                    <div class="tab-item">В ожидании</div>
                    <div class="tab-item primary">Добавить в друзья</div>
                </nav>
            </header>

            <div class="chat-content">
                <div class="chat-welcome">
                    <div class="welcome-icon">👋</div>
                    <h2 class="welcome-title">Выберите друга</h2>
                    <p>Выберите друга из списка, чтобы начать общение.</p>
                </div>
                <!-- Messages will be rendered here -->
            </div>

            <form class="chat-input-form">
                <div class="chat-input-wrapper">
                    <button type="button" class="btn-icon" aria-label="Attach file"><i class="fa-solid fa-paperclip"></i></button>
                    <input type="text" class="chat-input" placeholder="Написать сообщение...">
                    <button type="submit" class="btn-icon" aria-label="Send message"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </form>
        </main>

      </div>
    </div>

    <!-- Other Screens -->
    <div id="error-screen" class="screen"></div>
  </div>
  
  <div id="toast-container"></div>

  <!-- Core Module Loading Order -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/connection.js"></script>
  
  <!-- Feature Modules -->
  <script src="js/servers.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/main.js"></script>

  <!-- Main Application Entry Point -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (window.S?.ui?.init) window.S.ui.init();
      if (window.S?.toast?.init) window.S.toast.init();
      
      try {
        // Auth module now handles its own loading indicators
        await window.S.auth.initSession();
      } catch (err) {
        console.error('[Init] Critical failure during session initialization:', err);
        if (window.S?.ui?.hideLoading) await window.S.ui.hideLoading();
        if (window.S?.ui?.showErrorState) {
            window.S.ui.showErrorState('Критический сбой при инициализации.', { isFatal: true, errorDetails: err });
        }
      }
    });
  </script>
</body>
</html>
