<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTCOR — Игровой мессенджер</title>
  <meta name="description" content="SENTCOR — игровой мессенджер с голосовыми чатами, серверами и друзьями." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --background-gradient-start: #050505; --background-gradient-end: #141417;
      --card-background: rgba(24, 24, 27, 0.7); --card-border: rgba(55, 55, 62, 0.5);
      --text-primary: #e4e4e7; --text-secondary: #a1a1aa; --primary-color: #3b82f6;
      --input-background: #27272a; --input-border: #3f3f46;
    }
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(145deg, var(--background-gradient-start), var(--background-gradient-end)); color: var(--text-primary); overflow: hidden; }
    #app { height: 100%; width: 100%; }
    .screen { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; flex-direction: column; box-sizing: border-box; position: absolute; top: 0; left: 0; transition: opacity 0.3s ease-in-out, visibility 0.3s; visibility: hidden; opacity: 0; }
    .screen[style*="display: flex"] { visibility: visible; opacity: 1; }
    .spinner { width: 56px; height: 56px; border: 5px solid var(--card-border); border-bottom-color: var(--primary-color); border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .auth-container { width: 100%; max-width: 400px; padding: 20px; }
    .auth-card { background: var(--card-background); border: 1px solid var(--card-border); border-radius: 12px; padding: 40px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
    .auth-header { text-align: center; margin-bottom: 30px; }
    .auth-title { font-size: 2.5rem; font-weight: 700; margin: 0; color: var(--text-primary); }
    .auth-subtitle { font-size: 1rem; color: var(--text-secondary); margin-top: 8px; }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-secondary); }
    .input-group input { width: 100%; padding: 12px; background: var(--input-background); border: 1px solid var(--input-border); border-radius: 8px; color: var(--text-primary); font-size: 1rem; box-sizing: border-box; }
    .btn { padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; }
    .btn-primary { background-color: var(--primary-color); color: white; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-secondary); }
    .auth-footer a { color: var(--primary-color); text-decoration: none; }
    .auth-error-message { color: #f87171; background-color: #450a0a; border: 1px solid #ef4444; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; }
    .auth-divider { text-align: center; margin: 25px 0; color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; display: flex; align-items: center; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--input-border); }
    .auth-divider span { padding: 0 10px; }
  </style>

  <!-- Core Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>

  <!-- Global Namespace -->
  <script>
    window.S = window.SENTCOR = window.S || {};
  </script>
</head>
<body>

  <div id="app">
    <div id="loading-screen" class="screen" style="display: flex;"><div class="spinner"></div></div>
    <div id="auth-screen" class="screen" style="display: none;">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1 class="auth-title">Вход</h1>
                    <p class="auth-subtitle">Войдите в свой аккаунт SENTCOR</p>
                </div>
                <div id="auth-error-message" class="auth-error-message"></div>
                <form id="auth-form"></form>
                <div id="auth-footer"></div>
            </div>
        </div>
    </div>
    <div id="main-app-screen" class="screen" style="display: none;"></div>
    <div id="error-screen" class="screen" style="display: none;"></div>
  </div>
  <div id="toast-container"></div>

  <!-- Core Module Loading Order -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script> <!-- MUST be first after config -->
  <script src="js/ui.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/connection.js"></script>
  
  <!-- Feature Modules -->
  <script src="js/servers.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/main.js"></script>

  <!-- Main Application Entry Point (Robust) -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Initialize UI components first, as they are needed for error display.
      if (window.S?.toast?.init) window.S.toast.init();
      if (window.S?.ui?.init) window.S.ui.init();

      try {
        // Attempt to initialize the session.
        // This function is now designed to fail gracefully.
        const sessionInitialized = await window.S.auth.initSession();
        
        if (!sessionInitialized) {
          console.log("[Init] No active session. Showing auth screen.");
          // If no session, we always show the auth UI.
          if (window.S?.ui?.showAuth) {
            window.S.ui.showAuth();
          } else {
            // Fallback if UI module failed
            const authScreen = document.getElementById('auth-screen');
            if (authScreen) authScreen.style.display = 'flex';
          }
        }
      } catch (err) {
        console.warn('[Init] Soft failure during session initialization:', err);
        // On any error during session check, we must show the auth screen
        // to prevent the user from being stuck on a black/loading screen.
        if (window.S?.ui?.showAuth) {
          window.S.ui.showAuth();
        } else {
           const authScreen = document.getElementById('auth-screen');
           if (authScreen) authScreen.style.display = 'flex';
        }
      }
    });
  </script>
</body>
</html>
